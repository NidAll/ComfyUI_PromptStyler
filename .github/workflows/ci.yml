name: ci

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Version sync
        run: python tools/version_sync.py check
      - name: Validate styles
        run: python tools/validate_styles.py
      - name: Audit styles
        run: python tools/audit_styles.py
      - name: Runtime regression tests
        run: python -m unittest discover -s tests
